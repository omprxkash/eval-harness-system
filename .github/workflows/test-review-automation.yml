name: review-automation tests

on:
  push:
    paths:
      - 'review-automation/**'
  pull_request:
    paths:
      - 'review-automation/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: review-automation/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/test_sentiment.py tests/test_routing.py tests/test_topics.py -v
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./test_reviews.db
