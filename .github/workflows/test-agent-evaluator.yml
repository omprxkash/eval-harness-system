name: agent-evaluator tests

on:
  push:
    paths:
      - 'agent-evaluator/**'
  pull_request:
    paths:
      - 'agent-evaluator/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-evaluator/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_integration.py
        env:
          ACTIVE_LLM_PROVIDER: gemini
          GEMINI_API_KEY: dummy-for-ci
